<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=block"
      rel="stylesheet"
    />
    <title>todo</title>
  </head>
  <body>
    <div class="app-progress" aria-hidden="true"></div>
    <div id="app">
      <nav class="top-nav" aria-label="Main navigation">
        <a class="top-nav__brand" href="/">Todos</a>

        <div class="nav-account">
          <button
            type="button"
            class="nav-account__trigger"
            aria-expanded="false"
            aria-controls="nav-account-menu"
            aria-haspopup="true"
          >
            <span class="nav-account__avatar" aria-hidden="true"></span>
            <span class="nav-account__label">Sign in</span>
            <span class="nav-account__chevron" aria-hidden="true"></span>
          </button>

          <div class="nav-account__menu" id="nav-account-menu" hidden>
            <div class="nav-account__auth">
              <form class="auth-form auth-form--sign-in">
                <input
                  type="email"
                  class="auth-input auth-email"
                  placeholder="Email"
                  autocomplete="email"
                  required
                />
                <input
                  type="password"
                  class="auth-input auth-password"
                  placeholder="Password"
                  autocomplete="current-password"
                  required
                />
                <button type="submit" class="auth-submit">Sign in</button>
                <p class="auth-message" hidden></p>
                <p class="auth-switch">
                  New User?
                  <button type="button" class="auth-switch__link" data-mode="sign-up">
                    Create account
                  </button>
                </p>
              </form>

              <form class="auth-form auth-form--sign-up" hidden>
                <input
                  type="email"
                  class="auth-input auth-email"
                  placeholder="Email"
                  autocomplete="email"
                  required
                />
                <input
                  type="password"
                  class="auth-input auth-password"
                  placeholder="Password"
                  autocomplete="new-password"
                  required
                />
                <button type="submit" class="auth-submit">Create account</button>
                <p class="auth-message" hidden></p>
                <p class="auth-switch">
                  Already have an account?
                  <button type="button" class="auth-switch__link" data-mode="sign-in">
                    Sign in
                  </button>
                </p>
              </form>
            </div>

            <div class="nav-account__signed-in" hidden>
              <button type="button" class="auth-sign-out">Sign out</button>
            </div>
          </div>
        </div>
      </nav>

      <main class="todo-app">
        <form class="todo-form">
          <label class="todo-field">
            <span class="todo-field__label">To do</span>
            <input
              type="text"
              class="todo-input"
              placeholder="What needs to be done?"
              autocomplete="off"
            />
          </label>
          <label class="todo-field todo-field--due">
            <span class="todo-field__label">Due date</span>
            <input type="hidden" class="todo-due-value" value="" />
            <button
              type="button"
              class="todo-due-trigger"
              aria-label="Choose due date"
            ></button>
          </label>
          <div class="todo-field todo-field--action">
            <span class="todo-field__label todo-field__label--spacer" aria-hidden="true">Due date</span>
            <button type="submit" class="todo-add-button" disabled>Add</button>
          </div>
        </form>

        <ul class="todo-list" aria-label="Todo items"></ul>

        <div class="todo-status" hidden aria-live="polite">
          <span class="todo-status__message"></span>
          <button type="button" class="todo-status__retry" hidden>Try again</button>
        </div>
      </main>

      <div class="toast-region" aria-live="polite" hidden></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
